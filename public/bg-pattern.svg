<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="g1" cx="30%" cy="20%" r="80%">
      <stop offset="0%" stop-color="#eef6ff" stop-opacity="0.55" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="g2" cx="80%" cy="80%" r="70%">
      <stop offset="0%" stop-color="#f1f5ff" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>
    <pattern id="stripes" width="40" height="40" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="20" height="40" fill="#eef2f7" opacity="0.06"></rect>
    </pattern>
  </defs>

  <rect width="1200" height="800" fill="#ffffff" />
  <rect width="1200" height="800" fill="url(#g1)" />
  <rect width="1200" height="800" fill="url(#g2)" />
  <rect width="1200" height="800" fill="url(#stripes)" />

  <!-- soft geometric shapes for interest -->
  <g fill="#0ea5a4" opacity="0.03">
    <circle cx="1000" cy="120" r="220" />
    <circle cx="240" cy="600" r="200" />
  </g>

  <!-- subtle vignette -->
  <rect width="1200" height="800" fill="black" opacity="0.02"/>
</svg>